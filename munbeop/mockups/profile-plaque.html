<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Mockup — Profile plaque + premios + popover (Placa de Unidad)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&family=Noto+Sans+KR:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet" />
<style>
  /* ── tokens (mirror app/assets/styles/tokens/*) ── */
  :root {
    --always-dark: #1a1a1a;
    --always-cream: #f8efd0;
    --paper: #f4ecd8;
    --paper-warm: #ded0b6;
    --paper-deep: #faf6ee;
    --ink: #2d1e18;
    --ink-soft: #705335;
    --ink-line: #8c6a4a;
    --jade: #5e8f4a;
    --sky: #b05c1e;
    --gold: #e6a121;
    --red: #c23e3e;
    --hover-bg: rgba(255, 196, 77, 0.25);
    --shadow-cream: #2d1e18;
    --bg: var(--paper);
    --surface: var(--paper-warm);
    --surface-hover: var(--hover-bg);
    --text: var(--ink);
    --text-soft: var(--ink-soft);
    --border: var(--ink-line);
    --border-strong: var(--ink-line);
    --shadow-color: var(--shadow-cream);
    --focus-ring: var(--gold);
    --accent: var(--gold);
    --danger: var(--red);
    --text-on-accent: var(--always-dark);
    --motion-quick: 120ms;
    --ease-out: ease;
    --shadow-pixel-sm: 2px 2px 0 var(--shadow-color);
    --shadow-pixel-md: 4px 4px 0 var(--shadow-color);
    --shadow-pixel-lg: 6px 6px 0 var(--shadow-color);
    --shadow-inset: inset 2px 2px 0 var(--shadow-color);
    --bevel: inset 2px 2px 0 rgba(255,255,255,.35), inset -2px -2px 0 rgba(0,0,0,.12);
  }
  [data-theme="dark"] {
    --paper: #0c1220;
    --paper-warm: #102623;
    --paper-deep: #1a2440;
    --ink: #e2e8f0;
    --ink-soft: #7d9a93;
    --ink-line: #52749f;
    --jade: #3ad29f;
    --sky: #6ea8d8;
    --gold: #e8923c;
    --red: #ff4757;
    --hover-bg: rgba(232, 146, 60, 0.22);
    --shadow-cream: #f1ece4;
    --text-on-accent: var(--always-dark);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 28px;
    background: #6b6b72;
    font-family: 'Inter', system-ui, sans-serif;
    display: flex; flex-wrap: wrap; gap: 28px; align-items: flex-start;
  }
  .panel {
    background: var(--bg);
    border: 3px solid #00000033;
    box-shadow: 0 8px 24px rgba(0,0,0,.35);
    padding: 0; position: relative; overflow: hidden;
  }
  .panel--s { width: 360px; height: 548px; }
  .panel--m { width: 560px; height: 600px; }
  .panel__caption {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--ink-soft);
    background: var(--paper-deep); border: 2px solid var(--ink-line); padding: 5px 8px;
    z-index: 9; white-space: nowrap;
  }
  /* mini-shell + sidebar (mirror AppShell/AppSidebar essentials) */
  .shell { display: grid; height: 100%; }
  .shell--expanded { grid-template-columns: 220px 1fr; }
  .shell--collapsed { grid-template-columns: 64px 1fr; }
  .sidebar {
    background: var(--paper-warm); border-right: 2px solid var(--border);
    padding: 24px 16px; display: flex; flex-direction: column; gap: 24px;
  }
  .sidebar--collapsed { padding: 24px 8px; }
  .sidebar__brand { display: flex; align-items: baseline; gap: 6px; }
  .sidebar--collapsed .sidebar__brand { flex-direction: column; align-items: center; gap: 10px; }
  .sidebar__brand-ko {
    font-family: 'Noto Sans KR', sans-serif; font-weight: 900; font-size: 26px; color: var(--gold);
    text-shadow: 2px 0 0 var(--always-dark), -2px 0 0 var(--always-dark), 0 2px 0 var(--always-dark),
      0 -2px 0 var(--always-dark), 2px 2px 0 var(--always-dark), -2px -2px 0 var(--always-dark),
      2px -2px 0 var(--always-dark), -2px 2px 0 var(--always-dark);
  }
  .sidebar--collapsed .sidebar__brand-ko { writing-mode: vertical-rl; text-orientation: upright; }
  .sidebar__brand-name { font-family: 'Press Start 2P', monospace; font-size: 14px; color: var(--text); }
  .sidebar--collapsed .sidebar__brand-name { display: none; }
  .sidebar__nav { display: flex; flex-direction: column; gap: 4px; }
  .sidebar__link {
    display: grid; grid-template-columns: 24px 1fr; align-items: center; gap: 10px;
    padding: 8px 10px; color: var(--text-soft); border: 2px solid transparent;
    font-family: 'Press Start 2P', monospace; font-size: 10px;
  }
  .sidebar--collapsed .sidebar__link { grid-template-columns: 24px; justify-items: center; gap: 0; padding: 6px 0; min-height: 44px; }
  .sidebar--collapsed .sidebar__label { display: none; }
  .sidebar__link--active { background: var(--paper); border-color: var(--ink-line); color: var(--text); box-shadow: 3px 3px 0 var(--shadow-color); }
  .sidebar__ico { width: 18px; height: 18px; display: grid; place-items: center; }
  .sidebar__footer { margin-top: auto; display: flex; flex-direction: column; gap: 16px; }
  .stage { padding: 18px; color: var(--text-soft); font-size: 12px; }

  /* ===== AccountMenu.vue scoped styles (verbatim, de-scoped) ===== */
  .acct__menu { --tier-epic: #8a5cd0; }
  [data-theme="dark"] .acct__menu { --tier-epic: #a982f0; }
  .acct { position: relative; display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 12px; background: var(--paper-warm); border: 2px solid var(--ink-line); border-bottom-width: 3px; box-shadow: var(--bevel), var(--shadow-pixel-sm); }
  .acct__avatar { position: relative; width: 96px; height: 96px; padding: 0; border: 3px solid var(--ink-line); border-radius: 0; background: var(--paper); box-shadow: var(--bevel), var(--shadow-pixel-md); display: grid; place-items: center; cursor: pointer; overflow: visible; image-rendering: pixelated; }
  .acct__inner { position: relative; z-index: 1; width: 64px; height: 64px; display: grid; place-items: center; background: var(--accent); color: var(--text-on-accent); box-shadow: inset 0 0 0 1px var(--ink-line); font-family: 'Press Start 2P', 'Noto Sans KR', monospace; font-size: 22px; }
  .acct__inner-img { width: 64px; height: 64px; image-rendering: pixelated; }
  .acct__avatar-bgclip { position: absolute; inset: 16px; overflow: hidden; z-index: 0; }
  .acct__avatar-bg { position: absolute; inset: 0; background-size: cover; background-position: center; image-rendering: pixelated; }
  .acct__avatar-frame { position: absolute; inset: -8px; width: 96px; height: 96px; image-rendering: pixelated; pointer-events: none; z-index: 2; }
  .acct__avatar--framed { border-color: transparent; background: transparent; }
  .acct__identity { max-width: 100%; margin: 0; font-family: 'Press Start 2P', 'Noto Sans KR', monospace; font-size: 9px; letter-spacing: .04em; color: var(--ink-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sidebar--collapsed .acct { background: transparent; border: none; box-shadow: none; padding: 6px; }
  .sidebar--collapsed .acct__avatar { width: 48px; height: 48px; }
  .sidebar--collapsed .acct__inner { width: 36px; height: 36px; font-size: 13px; }
  .sidebar--collapsed .acct__avatar-frame, .sidebar--collapsed .acct__avatar-bgclip { display: none; }
  .sidebar--collapsed .acct__avatar--framed { border-color: var(--ink-line); background: var(--paper); }
  .acct__pip { position: absolute; bottom: -6px; right: -6px; min-width: 20px; height: 20px; padding: 0 3px; display: grid; place-items: center; border: 2px solid var(--ink-line); background: var(--paper-deep); box-shadow: var(--shadow-pixel-sm); font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--ink-soft); }
  .acct__pip--has { color: var(--gold); }
  .acct__menu { position: absolute; z-index: 200; max-height: min(70vh, 560px); display: flex; flex-direction: column; gap: 12px; padding: 14px; width: 248px; background: var(--paper-deep); border: 3px solid var(--ink-line); box-shadow: var(--bevel), var(--shadow-pixel-lg); }
  .acct__menu::before, .acct__menu::after { content: ''; position: absolute; bottom: var(--caret-b, 24px); border-top: 8px solid transparent; border-bottom: 8px solid transparent; }
  .acct__menu::before { left: -10px; border-right: 10px solid var(--ink-line); }
  .acct__menu::after { left: -7px; border-right: 10px solid var(--paper-deep); }
  .acct__item--row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .acct__item-meta { color: var(--ink-soft); white-space: nowrap; }
  .acct__item-meta--has { color: var(--gold); }
  .acct__email { margin: 0; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-soft); word-break: break-all; }
  .acct__row { display: flex; flex-direction: column; }
  .acct__item { font-family: 'Press Start 2P', 'Noto Sans KR', monospace; font-size: 9px; letter-spacing: .04em; text-align: left; background: var(--surface); border: 2px solid var(--border); color: var(--text); padding: 10px; cursor: pointer; text-decoration: none; }
  .acct__signout { color: var(--danger); }
  .fakerow { display: flex; align-items: center; justify-content: space-between; font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text); }
  .fakeselect { width: 100%; background: var(--surface); border: 2px solid var(--border); color: var(--text); padding: 8px 10px; font-family: 'Press Start 2P', monospace; font-size: 10px; }
  .switch { width: 40px; height: 22px; border: 2px solid var(--ink-line); background: var(--gold); position: relative; }
  .switch::after { content: ''; position: absolute; top: 1px; right: 1px; width: 16px; height: 16px; background: var(--always-dark); }

  /* ===== Premios.vue scoped styles (verbatim, de-scoped) ===== */
  .premios, .premios__detail-wrap { --tier-epic: #8a5cd0; width: 100%; }
  [data-theme="dark"] .premios, [data-theme="dark"] .premios__detail-wrap { --tier-epic: #a982f0; }
  .premios__head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .premios__title, .premios__count { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--ink-soft); }
  .premios__count--has { color: var(--gold); }
  .premios__strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 100%; margin: 0; padding: 0; list-style: none; }
  .premio { position: relative; aspect-ratio: 1; min-width: 0; display: grid; place-items: center; padding: 3px; border: 2px solid var(--ink-line); --tier: var(--ink-line); }
  .premio__icon { max-width: 100%; max-height: 100%; object-fit: contain; image-rendering: pixelated; }
  .premio__lock { display: grid; place-items: center; color: var(--ink-soft); opacity: .55; }
  .premio--common { --tier: var(--jade); }
  .premio--rare { --tier: var(--sky); }
  .premio--epic { --tier: var(--tier-epic); }
  .premio--legendary { --tier: var(--gold); }
  .premio--unlocked { background: var(--paper-deep); border-color: var(--tier); box-shadow: inset 0 0 0 1px var(--tier), var(--shadow-pixel-sm); }
  .premio--unlocked.premio--legendary { box-shadow: inset 0 0 0 1px var(--always-dark), inset 0 0 0 2px var(--gold), var(--shadow-pixel-sm); }
  .premio--locked { background: var(--paper); border-style: dashed; border-color: color-mix(in srgb, var(--ink-line) 55%, transparent); box-shadow: var(--shadow-inset); }
  .premio--locked::after { content: ''; position: absolute; bottom: 3px; left: 28%; right: 28%; height: 0; border-bottom: 2px dotted var(--tier); opacity: .5; }
  .premios__detail-head { display: flex; justify-content: space-between; align-items: center; font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--ink-soft); }
  .premios__detail { display: flex; flex-direction: column; gap: 10px; max-height: 200px; overflow-y: auto; margin-top: 8px; }
  .premios__group { display: flex; flex-direction: column; gap: 6px; }
  .premios__group-title { margin: 0; font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: .04em; color: var(--text-soft); text-transform: uppercase; }
  .premios__row { display: grid; grid-template-columns: 40px 1fr; gap: 8px; align-items: center; }
  .premios__row-cell { width: 40px; height: 40px; aspect-ratio: auto; }
  .premios__row-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .premios__row-name { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 700; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .premios__row--locked .premios__row-name { color: var(--ink-soft); font-weight: 400; }
  .premios__row-tier { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--tier); }
  .premios__row--locked .premios__row-tier { color: transparent; -webkit-text-stroke: 1px var(--tier); }

  /* ===== /trophies page (mirror of app/pages/trophies.vue) ===== */
  .panel--page { width: 760px; height: 600px; }
  .panel--page .stagewrap { padding: 46px 28px 28px; overflow-y: auto; height: 100%; --tier-epic: #8a5cd0; }
  [data-theme="dark"] .panel--page .stagewrap { --tier-epic: #a982f0; }
  .tpage-head { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
  .tpage-title { font-family: 'Press Start 2P', monospace; font-size: 18px; color: var(--ink); -webkit-font-smoothing: none; font-smooth: never; }
  .tpage-title small { display: block; color: var(--gold); font-size: 11px; margin-top: 8px; }
  .tpage-count { font-family: 'Press Start 2P', monospace; font-size: 14px; color: var(--gold); border: 2px solid var(--ink-line); background: var(--paper-warm); box-shadow: var(--shadow-pixel-sm); padding: 8px 12px; }
  .tlevel-title { font-family: 'Press Start 2P', 'Noto Sans KR', monospace; font-size: 12px; color: var(--jade-deep, var(--jade)); margin: 18px 0 12px; -webkit-font-smoothing: none; font-smooth: never; }
  [data-theme="dark"] .tlevel-title { color: var(--jade); }
  .tgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 16px; }
  .trophy { --tier: var(--ink-line); display: flex; flex-direction: column; gap: 8px; padding: 14px; border: 2px solid var(--ink-line); }
  .trophy.premio--common { --tier: var(--jade); }
  .trophy.premio--rare { --tier: var(--sky); }
  .trophy.premio--epic { --tier: var(--tier-epic); }
  .trophy.premio--legendary { --tier: var(--gold); }
  .trophy--unlocked { background: var(--paper-deep); border-color: var(--tier); box-shadow: inset 0 0 0 1px var(--tier), var(--shadow-pixel-md); }
  .trophy--unlocked.premio--legendary { box-shadow: inset 0 0 0 1px var(--always-dark), inset 0 0 0 2px var(--gold), var(--shadow-pixel-md); }
  .trophy--locked { background: var(--paper); border-style: dashed; border-color: color-mix(in srgb, var(--ink-line) 55%, transparent); box-shadow: var(--shadow-inset); }
  .trophy__art { display: grid; place-items: center; height: 116px; background: color-mix(in srgb, var(--ink-line) 12%, transparent); }
  .trophy--locked .trophy__art { background: transparent; }
  .trophy__art img { max-width: 100%; max-height: 100%; object-fit: contain; image-rendering: pixelated; }
  .trophy__art .premio__lock { color: var(--ink-soft); opacity: .5; }
  .trophy__tier { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--tier); -webkit-font-smoothing: none; font-smooth: never; }
  .trophy--locked .trophy__tier { color: transparent; -webkit-text-stroke: 1px var(--tier); }
  .trophy__name { margin: 0; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700; color: var(--ink); }
  .trophy--locked .trophy__name { color: var(--ink-soft); }
  .trophy__desc { margin: 0; font-family: 'Inter', sans-serif; font-size: 12px; line-height: 1.5; color: var(--ink-soft); }
  .trophy--equipped { box-shadow: inset 0 0 0 2px var(--tier), var(--shadow-pixel-md); }
  .trophy--equipped.premio--legendary { box-shadow: inset 0 0 0 1px var(--always-dark), inset 0 0 0 3px var(--gold), var(--shadow-pixel-md); }
  .trophy__equip { margin-top: auto; align-self: flex-start; font-family: 'Press Start 2P', monospace; font-size: 8px; letter-spacing: .04em; padding: 8px 10px; background: var(--surface); border: 2px solid var(--ink-line); color: var(--ink); cursor: pointer; -webkit-font-smoothing: none; font-smooth: never; }
  .trophy__equip--on { background: var(--gold); color: var(--always-dark); border-color: var(--always-dark); }
</style>
</head>
<body>
  <!-- reusable bits via JS templating below -->
  <script>
    const LOCK = `<span class="premio__lock"><svg viewBox="0 0 16 16" width="12" height="12" shape-rendering="crispEdges"><path d="M5 7V5a3 3 0 0 1 6 0v2" fill="none" stroke="currentColor" stroke-width="2"/><rect x="3.5" y="7" width="9" height="7" fill="currentColor"/></svg></span>`;
    const NAV = `
      <div class="sidebar__brand"><span class="sidebar__brand-ko">문법</span><span class="sidebar__brand-name">Garden</span></div>
      <nav class="sidebar__nav">
        <a class="sidebar__link sidebar__link--active"><span class="sidebar__ico">🏡</span><span class="sidebar__label">Garden</span></a>
        <a class="sidebar__link"><span class="sidebar__ico">✎</span><span class="sidebar__label">Practice</span></a>
        <a class="sidebar__link"><span class="sidebar__ico">📖</span><span class="sidebar__label">Library</span></a>
        <a class="sidebar__link"><span class="sidebar__ico">📊</span><span class="sidebar__label">Stats</span></a>
      </nav>`;

    function strip(slots) {
      // slots: array of {tier, unlocked, icon?}
      const cells = slots.map(s => `
        <li class="premio premio--${s.tier} ${s.unlocked ? 'premio--unlocked' : 'premio--locked'}">
          ${s.unlocked ? `<img class="premio__icon" src="${s.icon}">` : LOCK}
        </li>`).join('');
      const n = slots.filter(s => s.unlocked).length;
      return `<div class="premios">
        <div class="premios__head"><span class="premios__title">TROPHIES</span><span class="premios__count ${n>0?'premios__count--has':''}">${n}/8</span></div>
        <ul class="premios__strip">${cells}</ul>
      </div>`;
    }

    function popover(count, caretB) {
      // Bottom-anchored to the avatar (real app: teleported + fixed, grows up).
      // The inventory is no longer inline — a single "Trophies" entry links to
      // the full /trophies page.
      return `<div class="acct__menu" role="menu" style="left: calc(100% + 14px); top: auto; bottom: -3px; --caret-b: ${caretB}px;">
        <p class="acct__email">sol@example.com</p>
        <div class="acct__row"><div class="fakerow"><span>Dark mode</span><span class="switch"></span></div></div>
        <div class="acct__row"><div class="fakeselect">English ▾</div></div>
        <a class="acct__item acct__item--row"><span>Trophies</span><span class="acct__item-meta ${count>0?'acct__item-meta--has':''}">${count}/8 ▸</span></a>
        <a class="acct__item">Settings</a>
        <button class="acct__item acct__signout">Sign out</button>
      </div>`;
    }

    function detailRow(tier, name, unlocked, icon) {
      return `<div class="premios__row premio--${tier} ${unlocked?'':'premios__row--locked'}">
        <span class="premio premios__row-cell premio--${tier} ${unlocked?'premio--unlocked':'premio--locked'}">${unlocked?`<img class="premio__icon" src="${icon}">`:LOCK}</span>
        <span class="premios__row-info"><span class="premios__row-name">${name}</span><span class="premios__row-tier">${tier.toUpperCase()}</span></span>
      </div>`;
    }

    const L1 = '../public/escape-room/level-01/cosmetics/';
    const emptySlots = [
      {tier:'common'}, {tier:'rare'}, {tier:'epic'}, {tier:'legendary'},
    ];
    const someSlots = [
      {tier:'common', unlocked:true, icon: L1+'cosmetic-bg-sunrise.png'},
      {tier:'rare', unlocked:true, icon: L1+'cosmetic-frame-apron.png'},
      {tier:'epic'}, {tier:'legendary'},
    ];
    const emptyDetail =
      `<div class="premios__group"><h3 class="premios__group-title">Una mañana en el minbak</h3>
        ${detailRow('common','Fondo "Minbak Sunrise"',false)}
        ${detailRow('rare','Marco "Delantal de Halmeoni"',false)}
        ${detailRow('epic','Avatar "Linterna Hanji"',false)}
        ${detailRow('legendary','Set "민박 손님"',false)}
      </div>`;
    const someDetail =
      `<div class="premios__group"><h3 class="premios__group-title">Una mañana en el minbak</h3>
        ${detailRow('common','Fondo "Minbak Sunrise"',true,L1+'cosmetic-bg-sunrise.png')}
        ${detailRow('rare','Marco "Delantal de Halmeoni"',true,L1+'cosmetic-frame-apron.png')}
        ${detailRow('epic','Avatar "Linterna Hanji"',false)}
        ${detailRow('legendary','Set "민박 손님"',false)}
      </div>`;

    function plaqueExpanded(framed, withMenu) {
      const frame = framed ? `<img class="acct__avatar-frame" src="${L1}cosmetic-frame-apron.png">` : '';
      const avatarClass = framed ? 'acct__avatar acct__avatar--framed' : 'acct__avatar';
      return `<div class="acct">
        <button class="${avatarClass}"><span class="acct__inner">S</span>${frame}</button>
        <p class="acct__identity">sol</p>
        ${strip(framed ? someSlots : emptySlots)}
        ${withMenu ? popover(framed ? 2 : 0, 150) : ''}
      </div>`;
    }
    function plaqueCollapsed(count, withMenu) {
      return `<div class="acct">
        <button class="acct__avatar"><span class="acct__inner">S</span><span class="acct__pip ${count>0?'acct__pip--has':''}">${count}</span></button>
        ${withMenu ? popover(count, 24) : ''}
      </div>`;
    }

    function trophyCard(tier, name, desc, unlocked, icon, equipped) {
      const art = unlocked
        ? `<img src="${icon}">`
        : `<span class="premio__lock"><svg viewBox="0 0 16 16" width="26" height="26" shape-rendering="crispEdges"><path d="M5 7V5a3 3 0 0 1 6 0v2" fill="none" stroke="currentColor" stroke-width="2"/><rect x="3.5" y="7" width="9" height="7" fill="currentColor"/></svg></span>`;
      const equipBtn = unlocked
        ? `<button class="trophy__equip ${equipped?'trophy__equip--on':''}">${equipped?'✓ Equipped':'Equip'}</button>`
        : '';
      return `<article class="trophy premio--${tier} ${unlocked?'trophy--unlocked':'trophy--locked'} ${equipped?'trophy--equipped':''}">
        <div class="trophy__art">${art}</div>
        <span class="trophy__tier">${tier.toUpperCase()}</span>
        <h3 class="trophy__name">${name}</h3>
        <p class="trophy__desc">${desc}</p>
        ${equipBtn}
      </article>`;
    }
    function trophiesPanel(theme) {
      const cards = [
        trophyCard('common','Fondo "Minbak Sunrise"','Amanecer rosa-melocotón sobre el techo del hanok.', true, L1+'cosmetic-bg-sunrise.png', true),
        trophyCard('rare','Marco "Delantal de Halmeoni"','Marco con estampado de delantal coreano floreado.', true, L1+'cosmetic-frame-apron.png', true),
        trophyCard('epic','Avatar "Linterna Hanji"','Silueta animada con linterna de papel coreano.', false),
        trophyCard('legendary','Set completo "민박 손님"','Avatar + marco + fondo + título "Huésped del minbak".', false),
      ].join('');
      return `<div class="panel panel--page" ${theme==='dark'?'data-theme="dark"':''}>
        <div class="panel__caption">/TROPHIES PAGE · ${theme.toUpperCase()}</div>
        <div class="stagewrap">
          <div class="tpage-head"><div class="tpage-title">전리품<small>Trophies</small></div><span class="tpage-count">2/8</span></div>
          <div class="tlevel-title">Una mañana en el minbak</div>
          <div class="tgrid">${cards}</div>
        </div>
      </div>`;
    }

    function panel({theme, collapsed, caption, framed, count, size, withMenu}) {
      const cls = collapsed ? 'collapsed' : 'expanded';
      const footer = collapsed ? plaqueCollapsed(count ?? 0, withMenu) : plaqueExpanded(framed, withMenu);
      return `<div class="panel panel--${size ?? 's'}" ${theme==='dark'?'data-theme="dark"':''}>
        <div class="panel__caption">${caption}</div>
        <div class="shell shell--${cls}">
          <aside class="sidebar ${collapsed?'sidebar--collapsed':''}">
            ${NAV}
            <div class="sidebar__footer">${footer}</div>
          </aside>
          <main class="stage">My Garden…</main>
        </div>
      </div>`;
    }

    document.body.insertAdjacentHTML('beforeend', [
      // Row 1 — the four sidebar states (menu closed): plaque + portrait + strip + pip.
      panel({theme:'light', collapsed:false, framed:false, caption:'LIGHT · EXPANDED · empty case'}),
      panel({theme:'light', collapsed:true, count:0, caption:'LIGHT · COLLAPSED (64px)'}),
      panel({theme:'dark', collapsed:false, framed:true, caption:'DARK · EXPANDED · 2 won + frame'}),
      panel({theme:'dark', collapsed:true, count:2, caption:'DARK · COLLAPSED · pip 2'}),
      // Row 2 — the simplified popover (just a "Trophies" link now).
      panel({theme:'light', collapsed:false, framed:false, withMenu:true, size:'m', caption:'LIGHT · MENU OPEN · Trophies link'}),
      panel({theme:'dark', collapsed:false, framed:true, withMenu:true, size:'m', caption:'DARK · MENU OPEN · Trophies link'}),
      // Row 3 — the dedicated /trophies page the link opens.
      trophiesPanel('light'),
      trophiesPanel('dark'),
    ].join(''));
  </script>
</body>
</html>
